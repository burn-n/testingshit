name: Run Discord Username Checker

on:
  workflow_dispatch:
  schedule:
    - cron: '*/2 * * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests colorama

      - name: Run script
        run: |
          python main.py
